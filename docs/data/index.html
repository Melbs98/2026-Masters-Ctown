<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>2026 Masters Draft & Scoreboard</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="wrap">
    <header>
      <h1>2026 Masters Draft & Scoreboard</h1>
      <p id="updated">Loading latest update...</p>
    </header>

    <section>
      <h2>Team Standings</h2>
      <table id="teams-table">
        <thead>
          <tr>
            <th>Rank</th>
            <th>Team</th>
            <th>Best 4 Total</th>
            <th>Scores Entered</th>
            <th>Roster Loaded</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section>
      <h2>All Player Scores</h2>
      <table id="scores-table">
        <thead>
          <tr>
            <th>Pos</th>
            <th>Player</th>
            <th>Score</th>
            <th>Today</th>
            <th>Thru</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
